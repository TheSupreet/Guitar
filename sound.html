<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sound.css">
    <title>Guitar — String sounds</title>
</head>

<body class="sound-page">
    <header class="sound-header">
        <div class="sound-header__inner">
            <h1 class="sound-title">String sounds</h1>
            <a class="sound-back" href="index.html">← Fretboard</a>
        </div>
    </header>

    <main class="sound-main">
        <p class="sound-intro">Open an instrument to hear each open string. Tap a string label to play or pause.</p>

        <div class="instruments">
            <article class="sound-card">
                <div class="sound-card__head">
                    <h2 class="sound-card__title">Guitar</h2>
                </div>
                <div class="sound-card__body">
                    <div class="instrument-preview" id="blur">
                        <img src="img/img1.png" alt="Guitar">
                    </div>
                    <button type="button" class="btn-open" onclick="toggle()">Open fretboard</button>
                </div>
            </article>

            <article class="sound-card">
                <div class="sound-card__head">
                    <h2 class="sound-card__title">Ukulele</h2>
                </div>
                <div class="sound-card__body">
                    <div class="instrument-preview" id="Ublur">
                        <img src="img/uklele-removebg-preview.png" alt="Ukulele">
                    </div>
                    <button type="button" class="btn-open" onclick="togle()">Open fretboard</button>
                </div>
            </article>
        </div>
    </main>

    <footer class="sound-footer">
        <p>© 2023 Supreet Kurdekar</p>
    </footer>

    <div class="pop-overlay" id="popimg" aria-hidden="true">
        <div class="pop-dialog" role="dialog" aria-modal="true" aria-labelledby="guitar-dialog-title">
            <h2 id="guitar-dialog-title" class="visually-hidden">Guitar strings</h2>
            <div class="pop-actions">
                <button type="button" class="btn-close" onclick="toggle()">Close</button>
            </div>
            <div class="pop-stack">
                <img src="img/popimg.png" alt="Guitar fretboard with string markers">
                <div class="string-btn">
                    <div class="g-s1"><button type="button" id="ebtn">E</button></div>
                    <div class="g-s2"><button type="button" id="abtn">A</button></div>
                    <div class="g-s3"><button type="button" id="dbtn">D</button></div>
                    <div class="g-s4"><button type="button" id="gbtn">G</button></div>
                    <div class="g-s5"><button type="button" id="bbtn">B</button></div>
                    <div class="g-s6"><button type="button" id="e2btn">E</button></div>
                </div>
            </div>
        </div>
    </div>

    <div class="pop-overlay" id="Upopimg" aria-hidden="true">
        <div class="pop-dialog" role="dialog" aria-modal="true" aria-labelledby="uke-dialog-title">
            <h2 id="uke-dialog-title" class="visually-hidden">Ukulele strings</h2>
            <div class="pop-actions">
                <button type="button" class="btn-close" onclick="togle()">Close</button>
            </div>
            <div class="pop-stack">
                <img src="img/ukele-board-removebg-preview.png" alt="Ukulele fretboard">
                <div class="Ubtn">
                    <div class="u-s1"><button type="button" id="Ugbtn">G</button></div>
                    <div class="u-s2"><button type="button" id="Ucbtn">C</button></div>
                    <div class="u-s3"><button type="button" id="Uebtn">E</button></div>
                    <div class="u-s4"><button type="button" id="Uabtn">A</button></div>
                </div>
            </div>
        </div>
    </div>

    <div class="audio-hidden" aria-hidden="true">
        <audio id="audio-e" src="audio/E-String.mp3"></audio>
        <audio id="audio-a" src="audio/A-String.mp3"></audio>
        <audio id="audio-d" src="audio/D-String.mp3"></audio>
        <audio id="audio-g" src="audio/G-string.mp3"></audio>
        <audio id="audio-b" src="audio/B-String.mp3"></audio>
        <audio id="audio-e2" src="audio/E6-String.mp3"></audio>
        <audio id="audio-Ug" src="audio/U-Gstring.mp3"></audio>
        <audio id="audio-Uc" src="audio/U-Cstring.mp3"></audio>
        <audio id="audio-Ue" src="audio/U-Estring.mp3"></audio>
        <audio id="audio-Ua" src="audio/U-Astring.mp3"></audio>
    </div>

    <script>
        function toggle() {
            document.getElementById('blur').classList.toggle('active');
            var pop = document.getElementById('popimg');
            pop.classList.toggle('active');
            pop.setAttribute('aria-hidden', pop.classList.contains('active') ? 'false' : 'true');
        }

        function togle() {
            document.getElementById('Ublur').classList.toggle('active');
            var pop = document.getElementById('Upopimg');
            pop.classList.toggle('active');
            pop.setAttribute('aria-hidden', pop.classList.contains('active') ? 'false' : 'true');
        }

        var audioE = document.getElementById('audio-e');
        var audioA = document.getElementById('audio-a');
        var audioD = document.getElementById('audio-d');
        var audioG = document.getElementById('audio-g');
        var audioB = document.getElementById('audio-b');
        var audioE2 = document.getElementById('audio-e2');

        document.getElementById('ebtn').addEventListener('click', function() {
            if (audioE.paused) {
                audioE.play();
            } else {
                audioE.pause();
            }
        });
        document.getElementById('abtn').addEventListener('click', function() {
            if (audioA.paused) {
                audioA.play();
            } else {
                audioA.pause();
            }
        });
        document.getElementById('dbtn').addEventListener('click', function() {
            if (audioD.paused) {
                audioD.play();
            } else {
                audioD.pause();
            }
        });
        document.getElementById('gbtn').addEventListener('click', function() {
            if (audioG.paused) {
                audioG.play();
            } else {
                audioG.pause();
            }
        });
        document.getElementById('bbtn').addEventListener('click', function() {
            if (audioB.paused) {
                audioB.play();
            } else {
                audioB.pause();
            }
        });
        document.getElementById('e2btn').addEventListener('click', function() {
            if (audioE2.paused) {
                audioE2.play();
            } else {
                audioE2.pause();
            }
        });

        var Uaudiog = document.getElementById('audio-Ug');
        var Uaudioc = document.getElementById('audio-Uc');
        var Uaudioe = document.getElementById('audio-Ue');
        var Uaudioa = document.getElementById('audio-Ua');

        document.getElementById('Ugbtn').addEventListener('click', function() {
            if (Uaudiog.paused) {
                Uaudiog.play();
            } else {
                Uaudiog.pause();
            }
        });
        document.getElementById('Ucbtn').addEventListener('click', function() {
            if (Uaudioc.paused) {
                Uaudioc.play();
            } else {
                Uaudioc.pause();
            }
        });
        document.getElementById('Uebtn').addEventListener('click', function() {
            if (Uaudioe.paused) {
                Uaudioe.play();
            } else {
                Uaudioe.pause();
            }
        });
        document.getElementById('Uabtn').addEventListener('click', function() {
            if (Uaudioa.paused) {
                Uaudioa.play();
            } else {
                Uaudioa.pause();
            }
        });
    </script>
</body>

</html>
